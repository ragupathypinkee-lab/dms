<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{ app_name }}</title>
    <link href="{{ bootstrap_css }}" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="card login-card">
        <div class="login-header">
            <span class="login-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M5.338 1.59a61.44 61.44 0 0 0-2.837.856.481.481 0 0 0-.328.39v.793c0 .409.11.785.346 1.086l1.794 2.153 1.794-2.153a1.66 1.66 0 0 0 .346-1.086v-.793a.48.48 0 0 0-.328-.39 62.09 62.09 0 0 0-2.837-.856z"/>
                    <path d="M8 5c-.535 0-.954.462-.9.995l.35 3.507a.905.905 0 0 1-.777.918 8.44 8.44 0 0 1-.597.036c-.392 0-.737-.062-1.015-.183a.905.905 0 0 1-.654-.956l.353-3.54A.902.902 0 0 0 8 5m-2.905 9.166a8.4 8.4 0 0 1-.715-.468c-.686-.454-1.066-1.09-1.066-1.832V5.5h6v5.166c0 .742-.38 1.378-1.066 1.832a8.4 8.4 0 0 1-.715.468 8.5 8.5 0 0 1-1.448.261 8.5 8.5 0 0 1-1.448-.261 8.4 8.4 0 0 1-.715-.468"/>
                </svg>
            </span>
            <h1>{{ app_name }}</h1>
            <p class="text-muted small mb-0">校内 AI 智能体孵化与管理平台</p>
        </div>
        <div class="card-body p-4 pt-3">
            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show py-2 mb-3" role="alert">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}
            <form method="post" action="/auth/login" class="needs-validation" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus
                           placeholder="请输入用户名">
                    <div class="invalid-feedback">请输入用户名</div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required
                           placeholder="请输入密码">
                    <div class="invalid-feedback">请输入密码</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">登录</button>
            </form>
            {% if show_demo_hint %}
            <div class="text-muted small text-center mt-3">
                演示账号：admin / admin123
            </div>
            {% endif %}
        </div>
    </div>
    <script src="{{ bootstrap_js }}"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
