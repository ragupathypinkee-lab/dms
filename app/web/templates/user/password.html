{% extends "base.html" %}

{% block title %}修改密码 - {{ app_name }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="/demand/list">首页</a></li>
        <li class="breadcrumb-item active" aria-current="page">修改密码</li>
    </ol>
</nav>

<div class="page-header">
    <h1>修改密码</h1>
    <p class="text-muted mb-0">修改当前账号「{{ current_user.username }}」的登录密码</p>
</div>

<div class="card content-card">
    <div class="card-body p-4">
        <form method="post" action="/user/password" class="needs-validation" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="current_password" class="form-label">当前密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="current_password" name="current_password"
                           required autocomplete="current-password">
                    <div class="invalid-feedback">请输入当前密码</div>
                </div>
                <div class="col-md-6">
                    <label for="new_password" class="form-label">新密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="new_password" name="new_password"
                           required minlength="6" autocomplete="new-password" placeholder="至少 6 位">
                    <div class="invalid-feedback">新密码至少 6 位</div>
                </div>
                <div class="col-md-6">
                    <label for="confirm_password" class="form-label">确认新密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           required minlength="4" autocomplete="new-password">
                    <div class="invalid-feedback">请再次输入新密码</div>
                </div>
            </div>
            <div class="form-actions sticky-actions d-flex gap-2">
                <button type="submit" class="btn btn-primary">保存密码</button>
                <a href="/demand/list" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
