{% extends "base.html" %}

{% block title %}{{ page_title }} - {{ app_name }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="/user/list">用户管理</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ page_title }}</li>
    </ol>
</nav>

<div class="page-header">
    <h1>{{ page_title }}</h1>
    <p class="text-muted mb-0">{{ page_subtitle }}</p>
</div>

<div class="card content-card">
    <div class="card-body p-4">
        <form method="post" action="{{ form_action }}" class="needs-validation" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-section-title">账号信息</div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" name="username"
                           required maxlength="50" autofocus placeholder="请输入用户名">
                    <div class="invalid-feedback">请输入用户名</div>
                </div>
                <div class="col-md-6">
                    <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password" name="password"
                           required minlength="6" placeholder="至少 6 位">
                    <div class="invalid-feedback">密码至少 6 位</div>
                </div>
            </div>
            <div class="alert alert-light border small mb-4">
                新用户可提交本单位 AI 需求，并跟踪智能体孵化进度。
            </div>
            <div class="form-actions sticky-actions d-flex gap-2">
                <button type="submit" class="btn btn-primary">创建用户</button>
                <a href="/user/list" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
