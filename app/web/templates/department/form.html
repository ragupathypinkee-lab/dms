{% extends "base.html" %}

{% block title %}{{ page_title }} - {{ app_name }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="/department/list">单位管理</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ page_title }}</li>
    </ol>
</nav>

<div class="page-header">
    <h1>{{ page_title }}</h1>
    <p class="text-muted mb-0">{{ page_subtitle }}</p>
</div>

<div class="card content-card">
    <div class="card-body p-4">
        <form method="post" action="{{ form_action }}" class="needs-validation" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-section-title">单位信息</div>
            <div class="row g-3 mb-4">
                <div class="col-md-8">
                    <label for="name" class="form-label">单位名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name"
                           value="{{ department.name if department else '' }}"
                           required maxlength="100" autofocus placeholder="如：教务处、图书馆">
                    <div class="invalid-feedback">请输入单位名称</div>
                </div>
                <div class="col-md-4">
                    <label for="sort_order" class="form-label">排序</label>
                    <input type="number" class="form-control" id="sort_order" name="sort_order"
                           value="{{ department.sort_order if department else 0 }}" min="0" step="1">
                    <div class="form-text">数字越小越靠前</div>
                </div>
            </div>
            <div class="form-actions sticky-actions d-flex gap-2">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/department/list" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
